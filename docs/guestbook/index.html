:#1a1a1a;margin:0;word-break:break-word}.chat-input-bar[data-astro-cid-apcim5e5]{background:#ecfccb;border-top:3px solid #1a1a1a;padding:.6rem;display:flex;gap:.5rem}.chat-name-input[data-astro-cid-apcim5e5]{width:120px!important}.chat-msg-input[data-astro-cid-apcim5e5]{flex:1}.chat-name-input[data-astro-cid-apcim5e5],.chat-msg-input[data-astro-cid-apcim5e5],#stamp-dropdown[data-astro-cid-apcim5e5]{font-family:Space Mono,monospace;font-size:.85rem}
</style></head> <body data-astro-cid-apcim5e5> <main class="page-container" data-astro-cid-apcim5e5> <div class="nav-header" data-astro-cid-apcim5e5> <a href="/" class="retro-btn" data-astro-cid-apcim5e5>← go back home</a> </div> <section class="guestbook-container chat-style" data-astro-cid-apcim5e5> <div class="chat-header" data-astro-cid-apcim5e5> <h3 data-astro-cid-apcim5e5>🟢 live guestbook chat</h3> <span class="chat-status" data-astro-cid-apcim5e5>online</span> </div> <div class="guestbook-wall chat-history" id="guestbook-wall" data-astro-cid-apcim5e5></div> <form class="guestbook-form chat-input-bar" id="guestbook-form" data-astro-cid-apcim5e5> <input type="text" id="name" placeholder="your name..." required class="chat-name-input" data-astro-cid-apcim5e5> <input type="text" id="message" placeholder="send a message..." required class="chat-msg-input" data-astro-cid-apcim5e5> <div class="chat-stamp-select" data-astro-cid-apcim5e5> <select id="stamp-dropdown" data-astro-cid-apcim5e5> <option value="🌟" data-astro-cid-apcim5e5>🌟 star</option> <option value="❤️" data-astro-cid-apcim5e5>❤️ heart</option> <option value="👻" data-astro-cid-apcim5e5>👻 ghost</option> <option value="🐱" data-astro-cid-apcim5e5>🐱 cat</option> </select> </div> <button type="submit" class="chat-send-btn" data-astro-cid-apcim5e5>➔</button> </form> </section> </main> <script>
  const SUPABASE_URL = "";
  const SUPABASE_KEY = "";

  const form = document.querySelector('.guestbook-form');
  const wall = document.querySelector('.guestbook-wall');

  // FETCH RECORDS\
  async function fetchEntries() {
    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/guestbook?select=*&order=id.desc`, {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      });
      const entries = await response.json();
      
      entries.forEach(entry => {
        wall.innerHTML += `
          <div class="guestbook-entry">
            <div class="entry-header">
              <strong>${escapeHTML(entry.name)}</strong>
              <span class="entry-stamp">${escapeHTML(entry.stamp)}</span>
            </div>
            <p class="entry-text">${escapeHTML(entry.message)}</p>
          </div>
        `;
      });
    } catch (err) {
      console.error("Error loading guestbook:", err);
    }
  }

  // SUBMIT FORM (Updated to securely call our RPC function!)
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const message = document.getElementById('message').value;
    const stamp = document.querySelector('input[name="stamp"]:checked').value;
    
    const stampEmojis = { star: "🌟", heart: "❤️", ghost: "👻", cat: "🐱" };
    const chosenEmoji = stampEmojis[stamp] || "🌟";

    try {
      // Notice the URL change to /rpc/insert_guestbook_entry!
      const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/insert_guestbook_entry`, {
        method: 'POST',
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ 
          p_name: name, 
          p_message: message, 
          p_stamp: chosenEmoji 
        })
      });

      if (response.ok) {
        form.reset();
        fetchEntries();
      } else {
        alert("Oops, something went wrong saving your entry!");
      }
    } catch (err) {
      console.error("Error submitting entry:", err);
    }
  });

  function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
  }

  fetchEntries();
</script> </body> </html>
